apiVersion: v2
name: mission-control
description: A Helm chart for flanksource mission control
type: application
version: 0.1.0
appVersion: "0.0.10"
icon: https://github.com/flanksource.png
maintainers:
  - name: Flanksource
dependencies:
  - name: apm-hub
    version: ">= 0.0.20"
    repository: https://flanksource.github.io/charts
    condition: apm-hub.enabled
  - name: config-db
    version: "0.0.1417"
    repository: https://flanksource.github.io/charts
  - name: canary-checker
    version: "1.2.0"
    repository: https://flanksource.github.io/charts
  - name: flanksource-ui
    version: "1.4.289"
    repository: https://flanksource.github.io/charts
    condition: flanksource-ui.enabled
  - name: kratos
    version: "0.60.1"
    repository: https://k8s.ory.sh/helm/charts
    condition: kratos.enabled
    import-values:
      - child: secret
        parent: kratossecret
  - name: mission-control-kubernetes-view
    version: ">= 0.1.37"
    repository: https://flanksource.github.io/charts
    condition: views.kubernetes
  - name: mission-control-misc-playbooks
    version: "0.1.2"
    repository: https://flanksource.github.io/charts
    condition: mission-control-misc-playbooks.enabled
  - name: facet
    version: "0.1.63"
    repository: https://flanksource.github.io/charts
    condition: facet.enabled
